<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="c"><feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(139,92,246,0.14)"/></filter>
    <filter id="a"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(0,0,0,0.12)"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="120" y="120" width="560" height="560" rx="40" fill="white" filter="url(#c)"/>
  <text x="400" y="196" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">CLAYAVATAR</text>
  <!-- XL avatar -->
  <circle cx="220" cy="330" r="72" fill="#c4b5fd" filter="url(#a)"/>
  <text x="220" y="342" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#5b21b6" text-anchor="middle">JD</text>
  <circle cx="274" cy="384" r="16" fill="#34d399" stroke="white" stroke-width="4"/>
  <text x="220" y="428" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">XL · online</text>
  <!-- LG avatar -->
  <circle cx="370" cy="330" r="52" fill="#fca5a5" filter="url(#a)"/>
  <text x="370" y="340" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#991b1b" text-anchor="middle">AK</text>
  <circle cx="414" cy="372" r="13" fill="#fbbf24" stroke="white" stroke-width="3"/>
  <text x="370" y="404" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">LG · away</text>
  <!-- MD avatar -->
  <circle cx="490" cy="330" r="36" fill="#93c5fd" filter="url(#a)"/>
  <text x="490" y="339" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e40af" text-anchor="middle">SM</text>
  <circle cx="518" cy="358" r="10" fill="#9ca3af" stroke="white" stroke-width="3"/>
  <text x="490" y="384" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">MD · offline</text>
  <!-- SM avatar -->
  <circle cx="590" cy="330" r="24" fill="#bbf7d0" filter="url(#a)"/>
  <text x="590" y="337" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46" text-anchor="middle">TY</text>
  <circle cx="608" cy="348" r="8" fill="#ef4444" stroke="white" stroke-width="2"/>
  <text x="590" y="370" font-family="system-ui, sans-serif" font-size="13" fill="#9ca3af" text-anchor="middle">SM · busy</text>
  <!-- Avatar group row -->
  <text x="172" y="450" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Avatar Group</text>
  <circle cx="210" cy="510" r="36" fill="#c4b5fd" filter="url(#a)" stroke="white" stroke-width="4"/>
  <text x="210" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#5b21b6" text-anchor="middle">A</text>
  <circle cx="268" cy="510" r="36" fill="#93c5fd" filter="url(#a)" stroke="white" stroke-width="4"/>
  <text x="268" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e40af" text-anchor="middle">B</text>
  <circle cx="326" cy="510" r="36" fill="#fca5a5" filter="url(#a)" stroke="white" stroke-width="4"/>
  <text x="326" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#991b1b" text-anchor="middle">C</text>
  <circle cx="384" cy="510" r="36" fill="#bbf7d0" filter="url(#a)" stroke="white" stroke-width="4"/>
  <text x="384" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#065f46" text-anchor="middle">+4</text>
  <!-- Image avatar placeholder -->
  <circle cx="530" cy="510" r="36" fill="#fde68a" filter="url(#a)"/>
  <text x="530" y="518" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#92400e" text-anchor="middle">🧑</text>
  <!-- Badges under -->
  <rect x="172" y="572" width="80" height="28" rx="14" fill="#bbf7d0"/>
  <text x="212" y="591" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#065f46" text-anchor="middle">Active</text>
  <rect x="268" y="572" width="68" height="28" rx="14" fill="#bfdbfe"/>
  <text x="302" y="591" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e40af" text-anchor="middle">Pro</text>
  <rect x="352" y="572" width="80" height="28" rx="14" fill="#fecdd3"/>
  <text x="392" y="591" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#9d174d" text-anchor="middle">Admin</text>
  <rect x="448" y="572" width="92" height="28" rx="14" fill="#fde68a"/>
  <text x="494" y="591" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e" text-anchor="middle">Verified</text>
</svg>