<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="card"><feDropShadow dx="0" dy="12" stdDeviation="28" flood-color="rgba(0,0,0,0.10)"/></filter>
    <filter id="btn"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(52,211,153,0.40)"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- Card -->
  <rect x="120" y="120" width="560" height="560" rx="40" fill="white" filter="url(#card)"/>
  <rect x="120" y="120" width="560" height="560" rx="40" fill="rgba(255,255,255,0.6)"/>
  <!-- Label -->
  <text x="400" y="204" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">CLAYBUTTON</text>
  <!-- Button default -->
  <rect x="220" y="260" width="360" height="80" rx="24" fill="#34d399" filter="url(#btn)"/>
  <rect x="220" y="260" width="360" height="80" rx="24" fill="rgba(255,255,255,0.20)"/>
  <rect x="220" y="260" width="360" height="3" rx="2" fill="rgba(255,255,255,0.50)"/>
  <text x="400" y="308" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="white" text-anchor="middle">Get Started</text>
  <!-- Button pressed (smaller, lower) -->
  <rect x="252" y="382" width="296" height="68" rx="20" fill="#059669" filter="url(#btn)" opacity="0.7"/>
  <rect x="252" y="382" width="296" height="68" rx="20" fill="rgba(255,255,255,0.10)"/>
  <text x="400" y="424" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">Pressed</text>
  <!-- Size chips -->
  <rect x="200" y="492" width="100" height="48" rx="16" fill="#bbf7d0"/>
  <text x="250" y="522" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#065f46" text-anchor="middle">SM</text>
  <rect x="324" y="488" width="152" height="56" rx="18" fill="#34d399"/>
  <text x="400" y="522" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">MD</text>
  <rect x="500" y="484" width="100" height="64" rx="20" fill="#059669"/>
  <text x="550" y="524" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">LG</text>
  <!-- Colorway dots -->
  <circle cx="240" cy="610" r="24" fill="#34d399"/>
  <circle cx="296" cy="610" r="24" fill="#3b82f6"/>
  <circle cx="352" cy="610" r="24" fill="#ec4899"/>
  <circle cx="408" cy="610" r="24" fill="#8b5cf6"/>
  <circle cx="464" cy="610" r="24" fill="#fb923c"/>
  <circle cx="520" cy="610" r="24" fill="#9ca3af"/>
</svg>