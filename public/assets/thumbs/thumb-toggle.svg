<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </linearGradient>
    <filter id="c"><feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(236,72,153,0.14)"/></filter>
    <filter id="knob"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.18)"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="120" y="120" width="560" height="560" rx="40" fill="white" filter="url(#c)"/>
  <text x="400" y="196" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">CLAYTOGGLE</text>
  <!-- Toggle ON mint -->
  <rect x="172" y="228" width="112" height="56" rx="28" fill="#34d399"/>
  <rect x="172" y="228" width="112" height="56" rx="28" fill="rgba(255,255,255,0.15)"/>
  <circle cx="256" cy="256" r="22" fill="white" filter="url(#knob)"/>
  <text x="308" y="262" font-family="system-ui, sans-serif" font-size="17" font-weight="500" fill="#374151">Notifications</text>
  <!-- Toggle ON blue -->
  <rect x="172" y="318" width="112" height="56" rx="28" fill="#3b82f6"/>
  <rect x="172" y="318" width="112" height="56" rx="28" fill="rgba(255,255,255,0.15)"/>
  <circle cx="256" cy="346" r="22" fill="white" filter="url(#knob)"/>
  <text x="308" y="352" font-family="system-ui, sans-serif" font-size="17" font-weight="500" fill="#374151">Dark Mode</text>
  <!-- Toggle OFF -->
  <rect x="172" y="408" width="112" height="56" rx="28" fill="#e5e7eb"/>
  <circle cx="200" cy="436" r="22" fill="white" filter="url(#knob)"/>
  <text x="308" y="442" font-family="system-ui, sans-serif" font-size="17" font-weight="500" fill="#9ca3af">Sound Effects</text>
  <!-- Toggle ON pink -->
  <rect x="172" y="498" width="112" height="56" rx="28" fill="#ec4899"/>
  <rect x="172" y="498" width="112" height="56" rx="28" fill="rgba(255,255,255,0.15)"/>
  <circle cx="256" cy="526" r="22" fill="white" filter="url(#knob)"/>
  <text x="308" y="532" font-family="system-ui, sans-serif" font-size="17" font-weight="500" fill="#374151">Analytics</text>
  <!-- Toggle ON lavender -->
  <rect x="172" y="588" width="112" height="56" rx="28" fill="#8b5cf6"/>
  <rect x="172" y="588" width="112" height="56" rx="28" fill="rgba(255,255,255,0.15)"/>
  <circle cx="256" cy="616" r="22" fill="white" filter="url(#knob)"/>
  <text x="308" y="622" font-family="system-ui, sans-serif" font-size="17" font-weight="500" fill="#374151">Beta Features</text>
</svg>