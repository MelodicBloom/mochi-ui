<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="c"><feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(139,92,246,0.14)"/></filter>
    <filter id="f"><feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(139,92,246,0.40)"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="120" y="120" width="560" height="560" rx="40" fill="white" filter="url(#c)"/>
  <text x="400" y="196" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">CLAYINPUT</text>
  <!-- Input 1 - focused -->
  <text x="172" y="248" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Search</text>
  <rect x="172" y="258" width="456" height="60" rx="18" fill="#f9fafb" filter="url(#f)"/>
  <rect x="172" y="258" width="456" height="60" rx="18" stroke="#8b5cf6" stroke-width="2" fill="none"/>
  <circle cx="212" cy="288" r="12" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="220" y1="296" x2="226" y2="302" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <text x="240" y="294" font-family="system-ui, sans-serif" font-size="16" fill="#9ca3af">Search anything...</text>
  <!-- Input 2 - default -->
  <text x="172" y="356" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Email</text>
  <rect x="172" y="366" width="456" height="60" rx="18" fill="#f3f4f6"/>
  <text x="220" y="402" font-family="system-ui, sans-serif" font-size="16" fill="#9ca3af">your@email.com</text>
  <!-- Input 3 - error -->
  <text x="172" y="464" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Password</text>
  <rect x="172" y="474" width="456" height="60" rx="18" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="510" font-family="system-ui, sans-serif" font-size="16" fill="#9ca3af">••••••••</text>
  <text x="172" y="548" font-family="system-ui, sans-serif" font-size="14" fill="#ef4444">Must be at least 8 characters</text>
  <!-- Cursor blink indicator -->
  <rect x="172" y="580" width="456" height="60" rx="18" fill="#f9fafb"/>
  <text x="220" y="616" font-family="system-ui, sans-serif" font-size="16" fill="#374151">Type here</text>
  <rect x="324" y="596" width="3" height="24" rx="2" fill="#8b5cf6"/>
</svg>