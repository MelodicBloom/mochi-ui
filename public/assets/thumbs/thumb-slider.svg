<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="c"><feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(245,158,11,0.14)"/></filter>
    <filter id="thumb"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(52,211,153,0.45)"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="120" y="120" width="560" height="560" rx="40" fill="white" filter="url(#c)"/>
  <text x="400" y="196" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">CLAYSLIDER</text>
  <!-- Slider 1 mint 65% -->
  <text x="172" y="254" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Volume</text>
  <rect x="172" y="268" width="456" height="16" rx="8" fill="#e5e7eb" style="box-shadow:inset 2px 2px 4px rgba(0,0,0,0.08)"/>
  <rect x="172" y="268" width="296" height="16" rx="8" fill="#34d399"/>
  <rect x="172" y="268" width="296" height="6" rx="3" fill="rgba(255,255,255,0.40)"/>
  <circle cx="468" cy="276" r="18" fill="white" filter="url(#thumb)" stroke="#34d399" stroke-width="3"/>
  <!-- Ticks -->
  <line x1="172" y1="296" x2="172" y2="308" stroke="#d1d5db" stroke-width="2"/>
  <line x1="286" y1="296" x2="286" y2="308" stroke="#d1d5db" stroke-width="2"/>
  <line x1="400" y1="296" x2="400" y2="308" stroke="#d1d5db" stroke-width="2"/>
  <line x1="514" y1="296" x2="514" y2="308" stroke="#d1d5db" stroke-width="2"/>
  <line x1="628" y1="296" x2="628" y2="308" stroke="#d1d5db" stroke-width="2"/>
  <!-- Slider 2 blue 40% -->
  <text x="172" y="358" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Brightness</text>
  <rect x="172" y="372" width="456" height="16" rx="8" fill="#e5e7eb"/>
  <rect x="172" y="372" width="182" height="16" rx="8" fill="#3b82f6"/>
  <rect x="172" y="372" width="182" height="6" rx="3" fill="rgba(255,255,255,0.40)"/>
  <circle cx="354" cy="380" r="18" fill="white" filter="url(#thumb)" stroke="#3b82f6" stroke-width="3"/>
  <!-- Slider 3 pink 80% -->
  <text x="172" y="442" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#374151">Saturation</text>
  <rect x="172" y="456" width="456" height="16" rx="8" fill="#e5e7eb"/>
  <rect x="172" y="456" width="365" height="16" rx="8" fill="#ec4899"/>
  <rect x="172" y="456" width="365" height="6" rx="3" fill="rgba(255,255,255,0.40)"/>
  <circle cx="537" cy="464" r="18" fill="white" filter="url(#thumb)" stroke="#ec4899" stroke-width="3"/>
  <!-- Value tooltip -->
  <rect x="444" y="224" width="60" height="32" rx="10" fill="#34d399"/>
  <text x="474" y="245" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">65%</text>
  <polygon points="474,256 466,268 482,268" fill="#34d399"/>
  <!-- Range display -->
  <rect x="172" y="530" width="456" height="140" rx="20" fill="#f9fafb"/>
  <text x="196" y="562" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b7280">Range: 0 — 100</text>
  <text x="196" y="588" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Step: 1  ·  Show Ticks: Yes</text>
  <text x="196" y="614" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Colorways: mint · blue · pink · lavender</text>
  <text x="196" y="640" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Sizes: sm · md · lg</text>
</svg>