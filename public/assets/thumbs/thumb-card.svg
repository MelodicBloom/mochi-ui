<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="c"><feDropShadow dx="0" dy="16" stdDeviation="32" flood-color="rgba(59,130,246,0.18)"/></filter>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="120" y="140" width="560" height="520" rx="40" fill="white" filter="url(#c)"/>
  <rect x="120" y="140" width="560" height="520" rx="40" fill="rgba(219,234,254,0.4)"/>
  <rect x="120" y="140" width="560" height="4" rx="2" fill="rgba(255,255,255,0.80)"/>
  <text x="400" y="216" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#9ca3af" text-anchor="middle" letter-spacing="2">CLAYCARD</text>
  <!-- Badge -->
  <rect x="172" y="244" width="88" height="32" rx="16" fill="#3b82f6"/>
  <text x="216" y="265" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Stats</text>
  <!-- Big number -->
  <text x="200" y="346" font-family="system-ui, sans-serif" font-size="64" font-weight="800" fill="#3b82f6">2,847</text>
  <text x="200" y="382" font-family="system-ui, sans-serif" font-size="18" fill="#9ca3af">Total interactions this month</text>
  <!-- Progress bar -->
  <rect x="172" y="420" width="456" height="16" rx="8" fill="#dbeafe"/>
  <rect x="172" y="420" width="329" height="16" rx="8" fill="#3b82f6"/>
  <rect x="172" y="420" width="329" height="6" rx="3" fill="rgba(255,255,255,0.40)"/>
  <text x="172" y="460" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Goal progress — 72%</text>
  <!-- Avatar row -->
  <circle cx="204" cy="540" r="28" fill="#bfdbfe"/>
  <text x="204" y="549" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e40af" text-anchor="middle">JD</text>
  <circle cx="204" cy="568" r="9" fill="#34d399" stroke="white" stroke-width="3"/>
  <text x="248" y="534" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1f2937">John Doe</text>
  <text x="248" y="556" font-family="system-ui, sans-serif" font-size="14" fill="#9ca3af">Premium subscriber</text>
  <rect x="248" y="570" width="68" height="24" rx="12" fill="#bbf7d0"/>
  <text x="282" y="587" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#065f46" text-anchor="middle">Active</text>
</svg>