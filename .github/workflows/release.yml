name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install

      - name: Build library
        run: npx tsup src/components/index.ts --format esm,cjs --dts --out-dir dist

      - name: Write publish package.json
        run: |
          cat > dist/package.json << 'EOF'
          {
            "name": "@mochiui/react",
            "version": "0.1.0",
            "description": "A multi-sensory claymorphism design system with 3D shaders, spatial audio, spring physics, and Figma compatibility",
            "type": "module",
            "main": "./index.cjs",
            "module": "./index.js",
            "types": "./index.d.ts",
            "exports": {
              ".": {
                "types": "./index.d.ts",
                "import": "./index.js",
                "require": "./index.cjs"
              }
            },
            "peerDependencies": {
              "react": ">=18",
              "react-dom": ">=18"
            },
            "repository": {
              "type": "git",
              "url": "git+https://github.com/qt314wink/mochi-ui.git"
            },
            "license": "MIT"
          }
          EOF

      - name: Publish to npm
        run: |
          cp README.md dist/README.md
          cp LICENSE dist/LICENSE 2>/dev/null || true
          cd dist
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0
          name: v0.1.0
          body: 'Initial release of @mochiui/react'
          files: |
            dist/index.js
            dist/index.cjs
            dist/index.d.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
