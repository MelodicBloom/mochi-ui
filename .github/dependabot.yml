version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      three:
        patterns:
          - "three"
          - "@types/three"
          - "@react-three/*"
      motion:
        patterns:
          - "motion"
          - "gsap"
          - "lenis"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
